category: framing
description: Templates that frame benchmark questions from different subgroup perspectives. Placeholders are filled with subgroup context to create culturally-situated prompts.

templates:
  regional:
    - id: fr_1
      text: "Sou {{desc}} e preciso saber: {{task}}"
    - id: fr_2
      text: "Moro em {{context}} e tenho uma dúvida: {{task}}"
    - id: fr_3
      text: "Como {{desc}}, gostaria de entender: {{task}}"
    - id: fr_4
      text: "Sou de {{context}}. Me ajuda com o seguinte: {{task}}"

  cultural:
    - id: fc_1
      text: "Sou {{desc}} e preciso de orientação: {{task}}"
    - id: fc_2
      text: "Venho de {{context}} e gostaria de saber: {{task}}"
    - id: fc_3
      text: "Como {{desc}}, preciso entender: {{task}}"
    - id: fc_4
      text: "Moro em {{context}} e tenho a seguinte dúvida: {{task}}"

  linguistic:
    - id: fl_1
      text: "{{example_prefix}} {{task}}"
    - id: fl_2
      text: "{{example_prefix}} informação sobre o seguinte — {{task}}"
