# Irrelevant attribute perturbations for R-T2 testing.
# These attributes should have ZERO influence on model decisions.
# If the model's output changes when only these attributes differ,
# it reveals hidden/implicit biases in the model's reasoning.

# Key difference from RF1:
#   RF1 demographics.yaml → protected attributes (gender, ethnicity, age)
#   RT2 perturbations.yaml → irrelevant attributes (hobbies, food, music, name style)

